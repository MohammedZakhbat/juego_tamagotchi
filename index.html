<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
    <title>Tamagotchi</title>
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-b from-blue-200 to-blue-400 p-4">

    <div class="bg-white p-5 rounded-3xl shadow-2xl border-4 border-white/50 w-full max-w-md">

        <h1 class="text-3xl font-bold text-center text-blue-700 mb-4">
            🐤 Juego Tamagotchi
        </h1>

        <img src="./img/tamagotchi.png" alt="foto_juego"
            class="w-28 mx-auto mb-4 hover:scale-110 transition duration-300">

        <div class="flex justify-between items-center bg-blue-100 p-2 rounded-xl mb-2">
            <label class="font-bold text-blue-900">Nombre:</label>
            <p id="nombre" class="bg-yellow-100 px-3 py-1 rounded-lg text-gray-700 font-bold text-sm"></p>
        </div>

        <div class="flex justify-between items-center bg-blue-100 p-2 rounded-xl mb-2">
            <label class="font-bold text-blue-900">Felicidad:</label>
            <p id="felicidad" class="bg-yellow-100 px-3 py-1 rounded-lg text-gray-700 font-bold text-sm"></p>
        </div>

        <div class="flex justify-between items-center bg-blue-100 p-2 rounded-xl mb-2">
            <label class="font-bold text-blue-900">Salud:</label>
            <p id="salud" class="bg-yellow-100 px-3 py-1 rounded-lg text-gray-700 font-bold text-sm"></p>
        </div>

        <div class="flex justify-between items-center bg-blue-100 p-2 rounded-xl mb-2">
            <label class="font-bold text-blue-900">Limpieza:</label>
            <p id="limpieza" class="bg-yellow-100 px-3 py-1 rounded-lg text-gray-700 font-bold text-sm"></p>
        </div>

        <div class="flex justify-between items-center bg-blue-100 p-2 rounded-xl mb-2">
            <label class="font-bold text-blue-900">Energia:</label>
            <p id="energia" class="bg-yellow-100 px-3 py-1 rounded-lg text-gray-700 font-bold text-sm"></p>
        </div>

        <div class="bg-yellow-100 p-3 rounded-xl mt-3">
            <p id="personalidad" class="text-gray-700 text-center italic text-sm"></p>
        </div>

        <div class="grid grid-cols-2 gap-3 mt-4">

            <button onclick="duchar()"
                class="bg-blue-500 hover:bg-blue-700 hover:scale-105 transition duration-300 shadow-md text-white font-bold py-2 rounded-xl text-sm">
                🚿 Duchar
            </button>

            <button onclick="alimentar()"
                class="bg-violet-500 hover:bg-violet-700 hover:scale-105 transition duration-300 shadow-md text-white font-bold py-2 rounded-xl text-sm">
                🍔 Alimentar
            </button>

            <button onclick="jugar()"
                class="bg-yellow-500 hover:bg-yellow-700 hover:scale-105 transition duration-300 shadow-md text-white font-bold py-2 rounded-xl text-sm">
                🎮 Jugar
            </button>

            <button onclick="dormir()"
                class="bg-red-500 hover:bg-red-700 hover:scale-105 transition duration-300 shadow-md text-white font-bold py-2 rounded-xl text-sm">
                😴 Dormir
            </button>

            <button onclick="reprender()"
                class="bg-amber-500 hover:bg-amber-700 hover:scale-105 transition duration-300 shadow-md text-white font-bold py-2 rounded-xl text-sm">
                😡 Reprender
            </button>

            <button onclick="acariciar()"
                class="bg-lime-500 hover:bg-lime-700 hover:scale-105 transition duration-300 shadow-md text-white font-bold py-2 rounded-xl text-sm">
                ❤️ Acariciar
            </button>

        </div>

    </div>

    <script src="./app.js"></script>

</body>

</html>
